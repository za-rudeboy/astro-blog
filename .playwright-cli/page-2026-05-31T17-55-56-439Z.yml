        - generic [ref=e28]: Playing with LangGraph
      - article [ref=e29]:
        - paragraph [ref=e30]:
          - text: I had never used
          - link "LangGraph" [ref=e31] [cursor=pointer]:
            - /url: https://www.langchain.com/langgraph
          - text: before today.
        - paragraph [ref=e32]: I had seen the name around, and I understood at a high level that it had something to do with agents and workflows, but I had not actually built anything with it yet.
        - paragraph [ref=e33]: If you have never heard of LangGraph before, the short version is that it is a Python framework for building stateful, multi-step LLM applications. Instead of thinking in terms of one prompt and one response, it lets you model a flow made up of steps, branching decisions, shared state, and persistence between steps.
        - paragraph [ref=e34]: "It also helps to place it in the broader LangChain ecosystem. LangChain is the wider set of tools and abstractions for building LLM applications, while LangGraph is the part focused on orchestration. Put simply: LangChain gives you building blocks for working with models, prompts, tools, and messages, and LangGraph gives you a structured way to run those pieces through a durable workflow."
        - paragraph [ref=e35]: "After spending some time with it, the biggest thing that made it click for me was this:"
        - paragraph [ref=e36]:
          - text: LangGraph is much easier to understand if you stop thinking about it as “AI magic” and instead think about it as a
          - strong [ref=e37]: stateful workflow engine
          - text: built on top of ideas that should already feel familiar if you have a computer science or software engineering background.
        - paragraph [ref=e38]: "In other words:"
        - list [ref=e39]:
          - listitem [ref=e40]:
            - text: the
            - strong [ref=e41]: graph
            - text: is the workflow structure
          - listitem [ref=e42]:
            - text: the
            - strong [ref=e43]: state
            - text: is the data moving through that structure
          - listitem [ref=e44]:
            - text: the
            - strong [ref=e45]: nodes
            - text: do work
          - listitem [ref=e46]:
            - text: the
            - strong [ref=e47]: edges
            - text: decide what happens next
        - paragraph [ref=e48]: Once I started looking at it that way, it stopped feeling mysterious.
        - separator [ref=e49]
        - heading "What LangGraph Actually Is" [level=4] [ref=e50]
        - paragraph [ref=e51]: At its core, LangGraph is a runtime for building multi-step applications where state moves through a graph.
        - paragraph [ref=e52]: It is developed as part of the LangChain ecosystem, but it solves a more specific problem. If LangChain is the general toolkit, LangGraph is the workflow layer inside that world. That distinction is useful because it explains why LangGraph starts to make sense only once your app has multiple steps, routing decisions, or memory that needs to survive beyond a single prompt.
        - paragraph [ref=e53]: Each step in the graph reads some state, does some work, and returns updates. The runtime then merges those updates into the shared state and follows the next edge.
        - paragraph [ref=e54]: "That may sound abstract, but it is actually pretty close to concepts most engineers already know:"
        - list [ref=e55]:
          - listitem [ref=e56]: control flow graphs
          - listitem [ref=e57]: state machines
          - listitem [ref=e58]: workflow engines
          - listitem [ref=e59]: durable jobs
        - paragraph [ref=e60]: "The LangGraph-specific part is that it adds features that are useful for LLM systems:"
        - list [ref=e61]:
          - listitem [ref=e62]: checkpointing
          - listitem [ref=e63]: resumability
          - listitem [ref=e64]: thread-level memory
          - listitem [ref=e65]: human-in-the-loop pauses
          - listitem [ref=e66]: streaming
        - paragraph [ref=e67]: So the graph theory gives you the structure, and LangGraph gives you the runtime behavior on top of that structure.
        - separator [ref=e68]
        - heading "What Made It Click For Me" [level=4] [ref=e69]
        - paragraph [ref=e70]: "The distinction that mattered most for me was:"
        - list [ref=e71]:
          - listitem [ref=e72]:
            - strong [ref=e73]: topology
            - text: ": the fixed shape of the workflow"
          - listitem [ref=e74]:
            - strong [ref=e75]: state
            - text: ": the mutable data moving through it"
        - paragraph [ref=e76]: That sounds obvious, but it is the mental model that made the rest of the API make sense.
        - paragraph [ref=e77]: In LangGraph, the graph topology is your nodes and edges. That is the static part.
        - paragraph [ref=e78]: "The state is the data you carry through the workflow: inputs, intermediate decisions, tool results, messages, or anything else the system needs while it runs."
        - paragraph [ref=e79]:
          - text: That separation matters because LangGraph is not really about “generate some text.” It is about
          - strong [ref=e80]: orchestrating a process
          - text: .
        - paragraph [ref=e81]: "That is why it feels like a good fit for:"
        - list [ref=e82]:
          - listitem [ref=e83]: branching workflows
          - listitem [ref=e84]: tool-calling agents
          - listitem [ref=e85]: multi-step support or review flows
          - listitem [ref=e86]: anything that may need persistence or a human approval point
        - paragraph [ref=e87]: And it is also why it would be overkill for a one-shot “prompt in, answer out” script.
        - separator [ref=e88]
        - 'heading "The First Example: A Tiny Graph" [level=4] [ref=e89]'
        - paragraph [ref=e90]: The first thing I built was a deliberately tiny example just to understand the mechanics.
        - code [ref=e92]:
          - generic [ref=e93]: builder = StateGraph(HelloState)
          - generic [ref=e94]: builder.add_node("introduce_topic", introduce_topic)
          - generic [ref=e95]: builder.add_node("explain_graph_shape", explain_graph_shape)
          - generic [ref=e96]: builder.add_edge(START, "introduce_topic")
          - generic [ref=e97]: builder.add_edge("introduce_topic", "explain_graph_shape")
          - generic [ref=e98]: builder.add_edge("explain_graph_shape", END)
        - paragraph [ref=e99]: "This was useful because it strips the whole idea down to the essentials:"
        - list [ref=e100]:
          - listitem [ref=e101]: define a state type
          - listitem [ref=e102]: define a couple of nodes
          - listitem [ref=e103]: connect them with edges
          - listitem [ref=e104]: compile the graph
        - paragraph [ref=e105]: That is it.
        - paragraph [ref=e106]: No models. No tools. No prompts. Just workflow mechanics.
        - paragraph [ref=e107]: For learning, that was the right place to start, because it made it obvious that a node is simply a step of computation and an edge is simply the control-flow rule that determines where execution goes next.
        - paragraph [ref=e108]: That kind of example is also a good reminder that LangGraph is not only for “full agent” systems. You can use it for ordinary, explicit workflows where an LLM might only appear in one or two nodes.
        - separator [ref=e109]
        - heading "The Example That Taught Me the Most" [level=4] [ref=e110]
        - paragraph [ref=e111]: The more useful example was a small support-ticket router.
        - paragraph [ref=e112]: "The shared state looked roughly like this:"
        - code [ref=e114]:
          - generic [ref=e115]: "class TicketState(TypedDict, total=False):"
          - generic [ref=e116]: "ticket_text: str"
          - generic [ref=e117]: "customer_tier: str"
          - generic [ref=e118]: "category: str"
          - generic [ref=e119]: "priority: str"
          - generic [ref=e120]: "response: str"
          - generic [ref=e121]: "next_step: str"
          - generic [ref=e122]: "needs_human: bool"
          - generic [ref=e123]: "history: Annotated[list[str], _append]"
        - paragraph [ref=e124]: This example made a few important things concrete for me.
        - paragraph [ref=e125]:
          - text: First, the state should be
          - strong [ref=e126]: raw application data
          - text: ", not prompt-shaped text. That means storing things like"
          - code [ref=e127]: "`category`"
          - text: ","
          - code [ref=e128]: "`priority`"
          - text: ", and"
          - code [ref=e129]: "`needs_human`"
          - text: as explicit fields instead of burying them inside strings.
        - paragraph [ref=e130]:
          - text: Second, nodes return
          - strong [ref=e131]: state updates
          - text: ", not some giant monolithic output object. One node might classify the ticket. Another might decide whether a human should review it. Another might prepare the next response. Each one owns a small part of the workflow."
        - paragraph [ref=e132]:
          - text: Third, the
          - code [ref=e133]: "`history`"
          - text: field showed me how state merging works. In this example, multiple nodes append to the same list rather than overwriting it. That gave me a simple audit trail of what happened during the run.
        - paragraph [ref=e134]: That last part felt especially useful. Once you have branching workflows, being able to inspect the decision path is not a nice-to-have. It is part of making the system debuggable.
        - paragraph [ref=e135]: "It also felt like a more realistic example than the usual “chatbot” framing. A ticket router has obvious steps, obvious branching, and obvious state: classify the request, decide whether it needs a human, route it, and keep enough history to explain why the system did what it did."
        - separator [ref=e136]
        - heading "Conditional Edges Are Where It Starts Feeling Powerful" [level=4] [ref=e137]
        - paragraph [ref=e138]: The part that felt most “LangGraph” to me was the conditional routing.
        - code [ref=e140]:
          - generic [ref=e141]: builder.add_conditional_edges(
          - generic [ref=e142]: "\"classify_ticket\","
          - generic [ref=e143]: choose_route,
          - generic [ref=e144]: "{"
          - generic [ref=e145]: "\"human_review\": \"human_review\","
          - generic [ref=e146]: "\"billing_response\": \"billing_response\","
          - generic [ref=e147]: "\"technical_response\": \"technical_response\","
          - generic [ref=e148]: "\"general_response\": \"general_response\","
          - generic [ref=e149]: "},"
          - generic [ref=e150]: )
        - paragraph [ref=e151]: This is where the workflow stops being a straight line and starts behaving like an actual process.
        - paragraph [ref=e152]:
          - text: The
          - code [ref=e153]: "`classify_ticket`"
          - text: node updates the state. Then
          - code [ref=e154]: "`choose_route`"
          - text: inspects that state and decides which node should run next.
        - paragraph [ref=e155]: "That felt familiar immediately, because it is just explicit branching:"
        - list [ref=e156]:
          - listitem [ref=e157]: if the ticket is high priority, escalate to a human
          - listitem [ref=e158]: otherwise route by category
        - paragraph [ref=e159]: The difference is that the branching is part of the graph structure itself. It is not buried somewhere in a large, tangled block of orchestration code.
        - paragraph [ref=e160]: That explicitness seems like one of the main reasons to use LangGraph in the first place.
        - separator [ref=e161]
        - heading "Graph API vs Functional API" [level=4] [ref=e162]
        - paragraph [ref=e163]: I also tried the Functional API so I could compare the two approaches.
        - paragraph [ref=e164]: The Graph API is the one that made the runtime model clearest to me. You see the nodes. You see the edges. You see the graph shape directly.
        - paragraph [ref=e165]: "The Functional API felt more like:"
        - paragraph [ref=e166]: “Keep writing normal Python, but let LangGraph wrap it with checkpointing and workflow semantics.”
        - paragraph [ref=e167]: "That version looked more like this:"
        - code [ref=e169]:
          - generic [ref=e170]: "@entrypoint(checkpointer=CHECKPOINTER)"
          - generic [ref=e171]: "def review_workflow(inputs: dict[str, Any], *, previous: Any = None) -> dict[str, Any]:"
          - generic [ref=e172]: assessment = score_change(inputs).result()
          - generic [ref=e173]: decision = choose_reviewer(assessment).result()
          - generic [ref=e174]: "return {"
          - generic [ref=e175]: "\"summary\": decision[\"summary\"],"
          - generic [ref=e176]: "\"risk_score\": decision[\"risk_score\"],"
          - generic [ref=e177]: "\"recommended_reviewer\": decision[\"reviewer\"],"
          - generic [ref=e178]: "\"recommended_action\": decision[\"action\"],"
          - generic [ref=e179]: "\"previous_run\": previous,"
          - generic [ref=e180]: "}"
        - paragraph [ref=e181]: This was a helpful contrast.
        - paragraph [ref=e182]: If the workflow structure itself is important and you want to inspect routing explicitly, the Graph API seems like the better fit.
        - paragraph [ref=e183]: If the logic is already easier to express as ordinary Python control flow, the Functional API feels more natural.
        - paragraph [ref=e184]: My first impression is that the Graph API is the better learning tool, while the Functional API is the easier bridge for existing Python orchestration code.
        - separator [ref=e185]
        - heading "Where I Think I Would Use LangGraph" [level=4] [ref=e186]
        - paragraph [ref=e187]: "After playing around with LangGraph for a bit, the use cases that make sense to me are:"
        - list [ref=e188]:
          - listitem [ref=e189]: multi-step agents that call tools
          - listitem [ref=e190]: workflows with branching decisions
          - listitem [ref=e191]: systems that need thread-level memory
          - listitem [ref=e192]: flows that may pause for human review
          - listitem [ref=e193]: long-running processes where resumability matters
        - paragraph [ref=e194]: "More concrete versions of those might be:"
        - list [ref=e195]:
          - listitem [ref=e196]: a support workflow that triages requests before deciding whether to draft a reply or escalate
          - listitem [ref=e197]: a research assistant that searches, summarizes, then asks for approval before continuing
          - listitem [ref=e198]: a document-processing pipeline that classifies files, extracts fields, and routes exceptions to a person
        - paragraph [ref=e199]: The common theme is that there is real workflow complexity to manage.
        - paragraph [ref=e200]: That also implies where I would not use it.
        - paragraph [ref=e201]: If I just need to call a model once, maybe parse a response, and return the result, LangGraph feels like unnecessary machinery.
        - paragraph [ref=e202]: Likewise, if there is no branching, no meaningful state, and no need for persistence, I would probably just use a direct SDK or a simpler LangChain flow.
        - paragraph [ref=e203]:
          - text: "That is probably the most important practical takeaway from day one:"
          - strong [ref=e204]: LangGraph solves orchestration problems, not every LLM problem.
        - separator [ref=e205]
        - heading "A Couple of First-Day Gotchas" [level=4] [ref=e206]
        - paragraph [ref=e207]: One thing that briefly confused me was local development.
        - paragraph [ref=e208]:
          - code [ref=e209]: "`langgraph dev`"
          - text: does run your graph locally, but the Studio UI experience is tied to LangSmith-hosted tooling. So even though the runtime is local, opening the Studio view in a browser may still ask you to log in.
        - paragraph [ref=e210]: "That makes more sense once you realize these are two separate things:"
        - list [ref=e211]:
          - listitem [ref=e212]: the graph server is local
          - listitem [ref=e213]: the Studio frontend is hosted
        - paragraph [ref=e214]: You can still work perfectly fine locally using the local API and docs endpoint, but it is worth knowing that “local runtime” does not necessarily mean “fully local browser UI.”
        - paragraph [ref=e215]: That is a tooling nuance, not a LangGraph concept, but it is exactly the kind of thing that is useful to understand early.
        - separator [ref=e216]
        - heading "Final Thoughts" [level=4] [ref=e217]
        - paragraph [ref=e218]: The thing I learned today is that LangGraph is not really hard in the abstract. It just helps a lot to place it in the right category.
        - paragraph [ref=e219]: If you approach it expecting some kind of magical agent abstraction, it feels vague.
        - paragraph [ref=e220]: If you approach it as a workflow runtime with shared state, explicit transitions, and persistence, it becomes much easier to reason about.
        - paragraph [ref=e221]: That framing also makes it easier to decide when to use it.
        - paragraph [ref=e222]: "For me, the next useful step is obvious: keep the workflow exactly as it is, but replace one deterministic node with a real model call."
        - paragraph [ref=e223]: That feels like the right abstraction boundary.
        - paragraph [ref=e224]: LangGraph should own the workflow. The model should just be one component inside it.
